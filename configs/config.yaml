# ==============================
# Dataset Configuration
# ==============================
dataset:
  # Multiple datasets support
  - name: original
    image_dir: dataset/Images
    mask_dir: dataset/Masks
  - name: crack500
    image_dir: dataset/crack500/Images
    mask_dir: dataset/crack500/Masks

image_size: 384
train_split: 0.7
val_split: 0.15

# ==============================
# Training Configuration
# ==============================
training:
  batch_size: 16
  epochs: 100
  learning_rate: 0.0001
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0005

# ==============================
# Validation Configuration
# ==============================
validation:
  thresholds: [0.3, 0.5, 0.7]

# ==============================
# Loss Configuration
# ==============================
loss:
  # Options: bce, dice, bce_dice, dbce, focal_dice, focal_tversky, focal_tversky_boundary
  name: focal_tversky_boundary
  # Class-imbalance handling for BCE-based losses
  pos_weight: 5.0
  # DBCE alpha: alpha * BCE + (1 - alpha) * LogCoshDice
  alpha: 0.6
  # Used by BCE + Dice
  bce_weight: 0.5
  smooth: 1.0
  # Focal Tversky parameters
  tversky_alpha: 0.6
  tversky_beta: 0.4
  tversky_gamma: 0.75
  # Deep supervision weighting
  deep_supervision_weight: 0.25
  deep_supervision_weights: [0.5, 0.3, 0.2]
  # Boundary supervision
  boundary_weight: 0.1
  boundary_kernel: 3
  edge_pos_weight: 5.0

# ==============================
# Model Configuration
# ==============================
model:
  name: dual_attention_residual_unet
  in_channels: 3
  num_classes: 1
  base_channels: 64
  deep_supervision: true
  edge_supervision: true
  skip_attention: true
  aspp_dilations: [1, 3, 6, 9]
  aspp_use_global_pool: false
  aspp_use_strip_pool: true
  aspp_dropout: 0.3

# ==============================
# Ablation Configuration
# ==============================
ablation:
  experiments:
    - id: baseline_unet_bce
      name: Baseline U-Net + BCE
      model_name: unet
      loss_name: bce
    - id: unet_dbce
      name: U-Net + DBCE
      model_name: unet
      loss_name: dbce
      alpha: 0.6
    - id: proposed_bce
      name: Proposed Model + BCE
      model_name: dual_attention_residual_unet
      loss_name: bce
    - id: proposed_dbce
      name: Proposed Model + DBCE
      model_name: dual_attention_residual_unet
      loss_name: dbce
      alpha: 0.6

# ==============================
# System Configuration
# ==============================
system:
  device: auto
  seed: 42
  seeds: [42, 123, 2024]
  deterministic: true
